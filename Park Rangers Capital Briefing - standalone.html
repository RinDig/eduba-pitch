document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

9, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"1baa2d48-eca5-43bf-b48e-dc36fe53eb68\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ===== Colors ========================================================== */\n  --eb-dark-brown:   #5D3136;\n  --eb-white:        #FEFBF6;\n  --eb-cream:        #EAD5D6;\n  --eb-skin:         #F9ECDF;\n  --eb-text-dark:    #4A2C2A;\n  --eb-light-brown:  #A2777A;\n  --eb-light-pink:   #D8BFC0;\n  --eb-subtitle:     #7D5658;\n  --eb-deep-wine:    #421D24;\n  --eb-green-dot:    #25CA58;\n  --eb-success:      #1A9C43;\n  --eb-brown-gradient: linear-gradient(358deg, #492526 1.79%, #5D4143 97.65%);\n\n  /* ===== Theme tokens (card/section themes) ============================= */\n  --eb-theme-rose-bg: #D8BFC1;   --eb-theme-rose-title: #5D3136;   --eb-theme-rose-dots: rgba(254,251,246,0.9); --eb-theme-rose-border: rgba(66,29,36,0.22);\n  --eb-theme-medium-bg: #7B5A5C; --eb-theme-medium-title: #FEFBF6; --eb-theme-medium-dots: rgba(254,251,246,0.9); --eb-theme-medium-border: rgba(254,251,246,0.24);\n  --eb-theme-paper-bg: #FFFFFF;  --eb-theme-paper-title: #5D3136;  --eb-theme-paper-dots: rgba(93,49,54,0.32);   --eb-theme-paper-border: rgba(93,49,54,0.18);\n  --eb-theme-skin-bg: #F9ECDF;   --eb-theme-skin-title: #5D3136;   --eb-theme-skin-dots: rgba(66,29,36,0.35);    --eb-theme-skin-border: rgba(66,29,36,0.2);\n  --eb-theme-wine-bg: #5D3136;   --eb-theme-wine-title: #FEFBF6;   --eb-theme-wine-dots: rgba(254,251,246,0.9);  --eb-theme-wine-border: rgba(254,251,246,0.22);\n\n  /* ===== Semantic roles ================================================= */\n  --eb-frame:       var(--eb-dark-brown);\n  --eb-content:     var(--eb-white);\n  --eb-warm-accent: var(--eb-skin);\n  --eb-fg1:         var(--eb-text-dark);\n  --eb-fg2:         var(--eb-subtitle);\n  --eb-fg-muted:    var(--eb-light-brown);\n  --eb-fg-inverse:  var(--eb-white);\n  --eb-border:      var(--eb-light-pink);\n\n  /* ===== Fonts ==========================================================\n     Diatype is the canonical brand editorial font (per BRAND.md §3).\n     Space Grotesk sits ONLY as a visual fallback until /fonts/diatype-*.woff2\n     are installed — Diatype leads the stack. Do not substitute other fonts.  */\n  --eb-font-primary: 'Diatype', 'Space Grotesk', system-ui, sans-serif;\n  --eb-font-mono:    'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;\n\n  /* ===== Type scale (tokens/typography.json) ============================ */\n  --eb-fs-hero-home:    clamp(120px, 20vw, 280px);\n  --eb-fs-hero-sector:  clamp(44px, 5vw, 92px);\n  --eb-fs-section:      clamp(28px, 3.4vw, 44px);\n  --eb-fs-cta:          clamp(26px, 3.4vw, 40px);\n  --eb-fs-body:         15px;\n  --eb-fs-body-sm:      14px;\n  --eb-fs-card-title:   15px;    /* Diatype, lowercase */\n  --eb-fs-faq:          14px;    /* Diatype, lowercase */\n  --eb-fs-section-label:16px;    /* Mono */\n  --eb-fs-card-id:      12px;    /* Mono */\n  --eb-fs-step:         12px;    /* Mono */\n  --eb-fs-nav:          11px;    /* Mono */\n  --eb-fs-page-idx:     11px;    /* Mono */\n  --eb-fs-tag:          11px;    /* Mono */\n  --eb-fs-form:         9px;     /* Mono */\n  --eb-fs-micro:        7px;     /* Mono */\n\n  --eb-ls-page-idx:     0.2em;\n  --eb-ls-tag:          0.1em;\n  --eb-ls-step:         0.1em;\n  --eb-ls-card-id:      0.05em;\n  --eb-ls-micro:        0.09em;\n  --eb-ls-display:      -0.02em;\n\n  --eb-lh-hero:         0.85;\n  --eb-lh-section:      1.1;\n  --eb-lh-body:         1.6;\n\n  --eb-fw-reg: 300; --eb-fw-med: 500; --eb-fw-semi: 600; --eb-fw-bold: 700;\n\n  /* ===== Spacing (tokens/spacing.json) ================================== */\n  --eb-frame-padding:     8px;   /* 5px mobile */\n  --eb-content-padding:   40px;\n  --eb-section-gap:       60px;\n  --eb-base-unit:         4px;\n\n  --eb-radius-sm: 4px;   /* default */\n  --eb-radius-md: 8px;   /* cards */\n  --eb-radius-lg: 12px;  /* modals */\n\n  /* ===== Grain / blur =================================================== */\n  --eb-grain-opacity: 0.055;\n  --eb-grain-blend:   soft-light;\n  --eb-backdrop-blur: 7px;\n\n  /* ===== Motion ========================================================= */\n  --eb-ease-spring-pop:  cubic-bezier(.34,1.56,.64,1);    /* ≈ back.out(2) */\n  --eb-ease-elastic:     cubic-bezier(.34,1.48,.64,1);\n  --eb-ease-settle:      cubic-bezier(.22,.61,.36,1);     /* ≈ power2.out */\n  --eb-ease-symmetric:   cubic-bezier(.45,.05,.55,.95);   /* ≈ power2.inOut */\n  --eb-ease-panel:       cubic-bezier(0.16, 1, 0.3, 1);\n  --eb-dur-hover:   220ms;\n  --eb-dur-chip:    180ms;\n  --eb-dur-panel:   520ms;\n}\n\n/* ===== @font-face — Diatype, self-hosted (per BRAND.md §3) ==============\n   These three declarations are canonical. Paths match the brand repo.\n   The browser will silently fall through to Space Grotesk until the\n   woff2 files are present at /fonts/. ====================================== */\n@font-face {\n  font-family: 'Diatype';\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ce5530b7-c524-4c64-8af5-ad0ff793e348\") format('woff2'),\n       url(\"73366457-9ab6-4951-a06f-f081cd77cf51\") format('woff2');\n}\n@font-face {\n  font-family: 'Diatype';\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"9b7ff191-1d18-44eb-90a0-f3194f1a9f77\") format('woff2'),\n       url(\"f28d934c-a1e8-46f9-860b-76cd3520c9f0\") format('woff2');\n}\n@font-face {\n  font-family: 'Diatype';\n  font-weight: 300;\n  font-display: swap;\n  src: url(\"aa1d28bb-19ce-4a3a-86de-aaffcf482439\") format('woff2'),\n       url(\"7acd43c2-1be8-4430-b00c-f78b050ae728\") format('woff2');\n}\n\n/* ===== Shell base ====================================================== */\nbody {\n  font-family: var(--eb-font-mono);\n  color: var(--eb-text-dark);\n  background: var(--eb-dark-brown);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  isolation: isolate;\n}\n.eb-page { font-family: var(--eb-font-primary); }\n\n/* ===== Type utility classes =========================================== */\n.eb-hero { font-family: var(--eb-font-primary); font-size: var(--eb-fs-hero-home); font-weight: 700; line-height: var(--eb-lh-hero); letter-spacing: var(--eb-ls-display); }\n.eb-hero-sector { font-family: var(--eb-font-primary); font-size: var(--eb-fs-hero-sector); font-weight: 700; white-space: pre-line; }\n.eb-section-h  { font-family: var(--eb-font-primary); font-size: var(--eb-fs-section); font-weight: 700; line-height: var(--eb-lh-section); }\n.eb-cta-title  { font-family: var(--eb-font-primary); font-size: var(--eb-fs-cta); line-height: var(--eb-lh-section); }\n.eb-body       { font-family: var(--eb-font-primary); font-size: var(--eb-fs-body); font-weight: 300; line-height: var(--eb-lh-body); color: var(--eb-subtitle); }\n.eb-card-title { font-family: var(--eb-font-primary); font-size: var(--eb-fs-card-title); font-weight: 700; text-transform: lowercase; }\n.eb-faq-q      { font-family: var(--eb-font-primary); font-size: var(--eb-fs-faq); font-weight: 600; text-transform: lowercase; }\n\n.eb-mono        { font-family: var(--eb-font-mono); text-transform: uppercase; }\n.eb-page-idx    { font-family: var(--eb-font-mono); font-size: var(--eb-fs-page-idx); font-weight: 700; letter-spacing: var(--eb-ls-page-idx); text-transform: uppercase; }\n.eb-tag         { font-family: var(--eb-font-mono); font-size: var(--eb-fs-tag); font-weight: 700; letter-spacing: var(--eb-ls-tag); text-transform: uppercase; }\n.eb-section-lbl { font-family: var(--eb-font-mono); font-size: var(--eb-fs-section-label); font-weight: 700; text-transform: uppercase; }\n.eb-card-id     { font-family: var(--eb-font-mono); font-size: var(--eb-fs-card-id); font-weight: 700; letter-spacing: var(--eb-ls-card-id); text-transform: uppercase; }\n.eb-step        { font-family: var(--eb-font-mono); font-size: var(--eb-fs-step); font-weight: 600; letter-spacing: var(--eb-ls-step); text-transform: uppercase; }\n.eb-nav         { font-family: var(--eb-font-mono); font-size: var(--eb-fs-nav); font-weight: 600; text-transform: uppercase; }\n.eb-micro       { font-family: var(--eb-font-mono); font-size: var(--eb-fs-micro); font-weight: 700; letter-spacing: var(--eb-ls-micro); text-transform: uppercase; }\n\n/* Card body indent — intentional typographic detail */\n.eb-card-body { text-indent: 30px; }\n\n/* Green dot pulse */\n@keyframes dotBlink { 0%,100% { opacity: 1; } 50% { opacity: 0.15; } }\n.eb-dot { width: 5px; height: 5px; background: var(--eb-green-dot); border-radius: 50%; animation: dotBlink 2s ease-in-out infinite; }\n<\u002Fstyle>\n\n<script src=\"100adfe7-6333-432f-b3f5-985aed8fe202\"><\u002Fscript>\n<style>\n  html, body { margin:0; padding:0; background:#000; overflow:hidden; height:100%; }\n  body { font-family: var(--eb-font-mono); }\n\n  /* ---- Frame + grain ------------------------------------------------- */\n  .slide {\n    background: var(--eb-dark-brown);\n    padding: 12px;\n    box-sizing: border-box;\n    color: var(--eb-text-dark);\n  }\n  .paper {\n    width: 100%;\n    height: 100%;\n    background: var(--eb-white);\n    border-radius: 4px;\n    position: relative;\n    overflow: hidden;\n    box-sizing: border-box;\n    font-family: var(--eb-font-primary);\n  }\n  .paper.wine   { background: var(--eb-dark-brown); color: var(--eb-white); }\n  .paper.skin   { background: var(--eb-skin); }\n  .paper.rose   { background: var(--eb-theme-rose-bg); }\n  .paper.medium { background: #7B5A5C; color: var(--eb-white); }\n\n  /* Film grain overlay */\n  .grain {\n    position: absolute; inset: 0; pointer-events: none; z-index: 9999;\n    opacity: 0.06; mix-blend-mode: soft-light;\n    background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><\u002Ffilter><rect width='100%' height='100%' filter='url(%23n)'/><\u002Fsvg>\");\n    background-size: 240px 240px;\n  }\n\n  /* ---- Chrome (nav bars top + bottom) -------------------------------- */\n  .chrome-top, .chrome-bot {\n    position: absolute; left: 48px; right: 48px;\n    display: flex; justify-content: space-between; align-items: center;\n    font-family: var(--eb-font-mono); font-size: 13px; font-weight: 600;\n    letter-spacing: 0.1em; text-transform: uppercase;\n    color: var(--eb-light-brown);\n  }\n  .paper.wine .chrome-top, .paper.wine .chrome-bot,\n  .paper.medium .chrome-top, .paper.medium .chrome-bot {\n    color: rgba(254,251,246,0.55);\n  }\n  .chrome-top { top: 40px; }\n  .chrome-bot { bottom: 40px; }\n  .chrome-top .brand { display:flex; gap:14px; align-items:center; color: var(--eb-dark-brown); }\n  .paper.wine .chrome-top .brand, .paper.medium .chrome-top .brand { color: var(--eb-white); }\n  .chrome-top .brand img { width: 22px; height: 22px; }\n  .chrome-top .dot {\n    width: 7px; height: 7px; background: var(--eb-green-dot); border-radius: 50%;\n    animation: dotBlink 2s ease-in-out infinite; margin-right: 10px;\n  }\n  .chrome-bot .page-idx { letter-spacing: 0.2em; }\n\n  /* ---- Folder tab atop content --------------------------------------- */\n  .folder-tab {\n    position: absolute; top: 40px; left: 50%;\n    transform: translateX(-50%);\n    display: inline-flex; align-items: center; gap: 14px;\n    background: var(--eb-dark-brown); color: var(--eb-white);\n    padding: 14px 38px 14px 32px;\n    border-radius: 6px 6px 0 0;\n    font-family: var(--eb-font-mono); font-size: 13px; font-weight: 600;\n    letter-spacing: 0.12em; text-transform: uppercase;\n  }\n  .paper.wine .folder-tab { background: var(--eb-white); color: var(--eb-dark-brown); }\n\n  /* ---- Corner arrow accent ------------------------------------------- */\n  .corner-tr {\n    position: absolute; top: 32px; right: 32px;\n    width: 22px; height: 22px;\n    border-top: 1.5px solid var(--eb-light-pink);\n    border-right: 1.5px solid var(--eb-light-pink);\n  }\n  .corner-bl {\n    position: absolute; bottom: 32px; left: 32px;\n    width: 22px; height: 22px;\n    border-bottom: 1.5px solid var(--eb-light-pink);\n    border-left: 1.5px solid var(--eb-light-pink);\n  }\n\n  /* ---- Content area (avoiding chrome) ------------------------------- */\n  .body {\n    position: absolute; left: 120px; right: 120px; top: 140px; bottom: 140px;\n    display: flex; flex-direction: column;\n  }\n\n  /* ---- Typography ---------------------------------------------------- */\n  .eyebrow {\n    font-family: var(--eb-font-mono); font-size: 16px; font-weight: 700;\n    letter-spacing: 0.18em; text-transform: uppercase;\n    color: var(--eb-light-brown); margin-bottom: 40px;\n  }\n  .paper.wine .eyebrow, .paper.medium .eyebrow { color: var(--eb-light-pink); }\n\n  h1.display {\n    font-family: var(--eb-font-primary); font-weight: 700;\n    font-size: 128px; line-height: 0.92; letter-spacing: -0.03em;\n    color: var(--eb-dark-brown); margin: 0;\n  }\n  .paper.wine h1.display, .paper.medium h1.display { color: var(--eb-white); }\n\n  h1.huge {\n    font-family: var(--eb-font-primary); font-weight: 700;\n    font-size: 168px; line-height: 0.88; letter-spacing: -0.035em;\n    color: var(--eb-dark-brown); margin: 0;\n  }\n\n  h2.title {\n    font-family: var(--eb-font-primary); font-weight: 700;\n    font-size: 76px; line-height: 1.02; letter-spacing: -0.02em;\n    color: var(--eb-dark-brown); margin: 0 0 32px 0;\n  }\n  .paper.wine h2.title, .paper.medium h2.title { color: var(--eb-white); }\n\n  h3.sub {\n    font-family: var(--eb-font-primary); font-weight: 500;\n    font-size: 44px; line-height: 1.2; letter-spacing: -0.015em;\n    color: var(--eb-subtitle); margin: 0;\n  }\n  .paper.wine h3.sub, .paper.medium h3.sub { color: var(--eb-light-pink); }\n\n  p.body-lg {\n    font-family: var(--eb-font-primary); font-weight: 300;\n    font-size: 32px; line-height: 1.5; color: var(--eb-text-dark);\n    margin: 0;\n  }\n  .paper.wine p.body-lg, .paper.medium p.body-lg { color: var(--eb-skin); }\n\n  p.body-md {\n    font-family: var(--eb-font-primary); font-weight: 300;\n    font-size: 26px; line-height: 1.55; color: var(--eb-subtitle);\n    margin: 0;\n  }\n  .paper.wine p.body-md, .paper.medium p.body-md { color: rgba(254,251,246,0.78); }\n\n  .meta {\n    font-family: var(--eb-font-mono); font-size: 14px; font-weight: 600;\n    letter-spacing: 0.15em; text-transform: uppercase;\n    color: var(--eb-light-brown);\n  }\n\n  .divider {\n    border: none; border-top: 1px dashed rgba(93,49,54,0.28);\n    margin: 28px 0;\n  }\n  .paper.wine .divider, .paper.medium .divider { border-top-color: rgba(254,251,246,0.24); }\n\n  /* ---- Slide 1 cover ------------------------------------------------- */\n  .cover-body {\n    position: absolute; left: 120px; right: 120px; top: 260px; bottom: 180px;\n    display: flex; flex-direction: column; justify-content: space-between;\n  }\n  .cover-title {\n    font-family: var(--eb-font-primary); font-weight: 700;\n    font-size: 200px; line-height: 0.88; letter-spacing: -0.035em;\n    color: var(--eb-dark-brown); margin: 0;\n  }\n  .cover-meta-row {\n    display: flex; justify-content: space-between; align-items: flex-end;\n    gap: 80px;\n  }\n  .cover-meta-col { max-width: 520px; }\n\n  /* ---- 30-day receipt ------------------------------------------------ */\n  .receipt {\n    display: grid; grid-template-columns: repeat(5, 1fr);\n    gap: 0; margin-top: 50px;\n    border-top: 1px solid rgba(93,49,54,0.22);\n    border-bottom: 1px solid rgba(93,49,54,0.22);\n  }\n  .receipt-item {\n    padding: 50px 32px 40px 32px;\n    border-right: 1px solid rgba(93,49,54,0.22);\n    display: flex; flex-direction: column; justify-content: space-between;\n    min-height: 340px;\n  }\n  .receipt-item:last-child { border-right: none; }\n  .receipt-num {\n    font-family: var(--eb-font-primary); font-weight: 700;\n    font-size: 84px; line-height: 0.95; letter-spacing: -0.025em;\n    color: var(--eb-dark-brown); margin: 0;\n  }\n  .receipt-label {\n    font-family: var(--eb-font-mono); font-size: 13px; font-weight: 600;\n    letter-spacing: 0.14em; text-transform: uppercase;\n    color: var(--eb-light-brown); margin-top: 24px;\n    line-height: 1.5;\n  }\n  .receipt-foot {\n    margin-top: 56px; display: flex; justify-content: space-between;\n    font-family: var(--eb-font-mono); font-size: 14px; letter-spacing: 0.14em;\n    text-transform: uppercase; color: var(--eb-light-brown); font-weight: 600;\n  }\n\n  /* ---- Trait slide --------------------------------------------------- */\n  .trait {\n    position: absolute; left: 120px; right: 120px; top: 140px; bottom: 140px;\n    display: grid; grid-template-columns: 1fr 1fr; gap: 120px;\n    align-items: stretch;\n  }\n  .trait-left { display: flex; flex-direction: column; justify-content: space-between; }\n  .trait-index {\n    font-family: var(--eb-font-mono); font-size: 15px; font-weight: 700;\n    letter-spacing: 0.2em; color: var(--eb-light-brown);\n  }\n  .trait-name {\n    font-family: var(--eb-font-primary); font-weight: 700;\n    font-size: 112px; line-height: 0.95; letter-spacing: -0.03em;\n    color: var(--eb-dark-brown); margin: 0;\n  }\n  .trait-tag {\n    font-family: var(--eb-font-mono); font-size: 13px; font-weight: 600;\n    letter-spacing: 0.15em; text-transform: uppercase;\n    color: var(--eb-subtitle); margin-top: 32px;\n  }\n  .trait-right {\n    display: flex; flex-direction: column; justify-content: center;\n    border-left: 1px solid rgba(93,49,54,0.22);\n    padding-left: 80px;\n  }\n  .trait-eviden
